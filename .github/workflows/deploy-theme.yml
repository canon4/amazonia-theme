name: Deploy Amazonia Theme

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copiar tema al servidor
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.agents' \
            --exclude='.claude' \
            --exclude='context.md' \
            --exclude='skills-lock.json' \
            --exclude='preview' \
            --exclude='docs/*.docx' \
            --exclude='docs/*.exe' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='node_modules' \
            --exclude='*.rar' \
            --exclude='*.zip' \
            . \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/amazonia-theme/

      - name: Inyectar tema en el contenedor WordPress
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "docker cp /tmp/amazonia-theme/. wordpress_app:/var/www/html/wp-content/themes/amazonia-theme/ && \
             docker exec wordpress_app chown -R www-data:www-data /var/www/html/wp-content/themes/amazonia-theme"

      - name: Limpiar tmp del servidor
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "rm -rf /tmp/amazonia-theme"
